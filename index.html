<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Eye Care Site</title>
    <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class='bg-gray-50 text-gray-900'>
    <!-- Navigation -->
    <nav class='p-6 bg-white shadow-sm flex justify-between items-center'>
        <h1 class='text-2xl font-bold text-blue-600'>EyeCare</h1>
        <ul class='flex space-x-6'>
            <li><a href='#' class='hover:text-blue-500'>Home</a></li>
            <li><a href='#products' class='hover:text-blue-500'>Shop</a></li>
            <li><a href='#about' class='hover:text-blue-500'>About</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <header class='py-20 text-center bg-blue-50'>
        <h2 class='text-5xl font-extrabold mb-4'>Clear Vision for a Better Life</h2>
        <p class='text-xl text-gray-600 mb-8'>Discover our premium collection of eye care products.</p>
        <button class='bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold'>Shop Now</button>
    </header>

    <!-- Image Section Example -->
    <section class='p-10 grid grid-cols-1 md:grid-cols-2 gap-8'>
        <div class='rounded-xl overflow-hidden shadow-lg'>
            <img src='shop-page-screenshot.png' alt='Shop' class='w-full h-auto'>
        </div>
        <div class='flex flex-col justify-center'>
            <h3 class='text-3xl font-bold mb-4'>Our Store</h3>
            <p class='text-gray-600'>We provide the best care for your eyes with certified specialists.</p>
        </div>
    </section>

    <footer class='p-10 bg-gray-900 text-white text-center'>
        <p>&copy; 2023 Eye Care Site. All rights reserved.</p>
    </footer>
</body>
</html>
